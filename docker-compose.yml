version: "3.9"

services:
  dashboard:
    build: .
    command: python web/app.py
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  interactive-bot:
    build: .
    command: python interactive_discord_bot.py
    ports:
      - "127.0.0.1:9101:9101"
    env_file:
      - .env
    environment:
      - INTERACTIVE_BOT_METRICS_PORT=9101
      - DISABLE_INTERNAL_SCHEDULER=1
    volumes:
      - ./:/app
    depends_on:
      dashboard:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./local_data/redis:/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./local_data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - dashboard
      - interactive-bot

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./local_data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
