name: alert-cycles

on:
  schedule:
    - cron: '*/15 * * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-alert-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Restore bot state cache
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: |
            anchors.json
            state.json
            storage/signals.db
            storage/outcomes.db
            storage/execution_analytics.db
          key: bot-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            bot-state-${{ github.ref_name }}-
            bot-state-

      - name: Ensure writable state files
        run: |
          mkdir -p storage
          [ -f anchors.json ] || printf '{}\n' > anchors.json
          [ -f state.json ] || printf '{}\n' > state.json

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run one alert cycle
        run: python bot.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MARKET_TIMEZONE: ${{ secrets.MARKET_TIMEZONE != '' && secrets.MARKET_TIMEZONE || 'US/Eastern' }}
          MARKET_OPEN: ${{ secrets.MARKET_OPEN != '' && secrets.MARKET_OPEN || '09:30' }}
          MARKET_CLOSE: ${{ secrets.MARKET_CLOSE != '' && secrets.MARKET_CLOSE || '16:00' }}
          ENABLE_AFTER_HOURS_ALERTS: ${{ secrets.ENABLE_AFTER_HOURS_ALERTS != '' && secrets.ENABLE_AFTER_HOURS_ALERTS || '0' }}

      - name: Save updated bot state cache
        uses: actions/cache/save@v4
        with:
          path: |
            anchors.json
            state.json
            storage/signals.db
            storage/outcomes.db
            storage/execution_analytics.db
          key: bot-state-${{ github.ref_name }}-${{ github.run_id }}

  notify-on-failure:
    needs: run-alert-cycle
    if: ${{ always() && needs.run-alert-cycle.result == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send failure alert to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is missing; skipping failure notification."
            exit 0
          fi
          payload=$(cat <<EOF
          {
            "content": "Alert workflow failed. Workflow: ${WORKFLOW} | Repo: ${REPO} | Branch: ${BRANCH} | Run: ${RUN_URL}"
          }
          EOF
          )
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
